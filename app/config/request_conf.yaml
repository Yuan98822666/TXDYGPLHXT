# =========================================================
# 东方财富 API 请求配置
# 天下第一股票量化系统
# =========================================================
#
# 架构说明：
#   - common      : 所有接口共用的通用参数
#   - endpoints   : 每个接口独立配置，采集器按 key 名读取
#   - 新增接口     : 在 endpoints 下添加新 key 即可，采集器代码无需改动
#
# 接口列表：
#   board_concept  → 概念板块基础信息
#   board_industry → 行业板块基础信息
#   base_stocks    → 全部上市股票基础信息
#
# =========================================================

# -------------------------------------------
# 通用参数（所有接口共用）
# -------------------------------------------
common:
  ut: "8dec03ba335b81bf4ebdf7b29ec27d15"  # API 认证令牌（东方财富公开值）
  cb: "jQuery1"                               # JSONP 回调函数名
  timeout: 10                                  # HTTP 请求超时（秒）
  max_pages: 100                               # 最大分页数（防止无限翻页）

# -------------------------------------------
# 接口端点配置
# -------------------------------------------
endpoints:

  # ==========================================
  # 概念板块接口
  # 作用：采集所有概念板块基础信息（名称、代码等）
  # 板块类型标识：GN（概念板块）
  # ==========================================
  board_concept:
    url: "https://push2.eastmoney.com/api/qt/clist/get"
    fid: "f62"       # 按主力净流入排序
    po: "1"           # 降序（从大到小）
    pz: "100"          # 每页 50 条
    np: "1"           # 页码类型
    fltt: "2"         # 价格精度
    invt: "2"         # 投资类型
    fs: "m:90+t:3"    # 筛选条件：概念板块（东方财富分类码）
    fields: "f12,f14,f2,f3,f62,f184,f66,f69,f72,f75,f78,f81,f84,f87,f124,f140,f141,f204,f205"
    # 字段映射：
    #   f12   → 板块代码          f14   → 板块名称
    #   f2    → 最新价            f3    → 涨跌幅
    #   f62   → 主力净流入        f184  → 主力净流入占比
    #   f66   → 超大单净流入       f72   → 超大单净流入占比
    #   f69   → 大单净流入         f75   → 大单净流入占比
    #   f78   → 中单净流入         f84   → 中单净流入占比
    #   f87   → 小单净流入         f124  → 小单净流入占比
    #   f140  → 领涨股代码         f141  → 领涨股市场（0=沪市，1=深市）
    #   f204  → 领涨股名称         f205  → 资金流入最多个股代码

  # ==========================================
  # 行业板块接口
  # 作用：采集所有行业板块基础信息（名称、代码等）
  # 板块类型标识：HY（行业板块）
  # ==========================================
  board_industry:
    url: "https://push2.eastmoney.com/api/qt/clist/get"
    fid: "f62"       # 按主力净流入排序
    po: "1"           # 降序（从大到小）
    pz: "100"          # 每页 50 条
    np: "1"           # 页码类型
    fltt: "2"         # 价格精度
    invt: "2"         # 投资类型
    fs: "m:90+s:4"    # 筛选条件：行业板块（东方财富分类码）
    fields: "f12,f14,f2,f3,f62,f184,f66,f69,f72,f75,f78,f81,f84,f87,f124,f140,f141,f204,f205"
    # 字段映射：同上

  # ==========================================
  # 板块成分股接口
  # 作用：采集指定板块内的所有成分股代码
  # 使用方式：fs 参数动态拼接，格式为 b:bk{block_code}+f:!50
  #           block_code 全小写，如 BK0428 → b:bk0428+f:!50
  # 注意：此接口使用独立的 ut 和 wbp2u，与 common.ut 不同！
  # ==========================================
  block_stocks:
    url: "https://push2.eastmoney.com/api/qt/clist/get"
    fid: "f3"          # 按涨跌幅排序
    po: "1"             # 降序
    pz: "100"           # 每页 100 条
    np: "1"             # 页码类型
    fltt: "1"           # 价格精度
    invt: "2"           # 投资类型
    dect: "1"           # 检测参数
    wbp2u: "3951356261349626|0|1|0|web"       # ⚠️ 此接口必须携带，否则 Connection closed
    # ut、cb 使用 common 公共参数
    # fs 参数在采集器中动态拼接，格式：b:bk{block_code}+f:!50
    # 示例：b:bk0428+f:!50（板块代码全小写，f:!50 排除停牌股）
    fs: ""              # 占位，采集器运行时动态覆盖
    fields: "f12"       # 只取股票代码，关联表只需要 stock_code
    # f12 → 股票代码（6位数字，如 300317）

  # ==========================================
  # 全部上市股票接口
  # 作用：采集 A 股全部上市股票的基础信息
  # 覆盖范围：沪深主板、创业板、科创板、北交所、新三板
  # ==========================================
  base_stocks:
    url: "https://push2.eastmoney.com/api/qt/clist/get"
    fid: "f12"        # 按股票代码排序
    po: "1"           # 降序
    pz: "100"         # 每页 100 条（股票数量大，每页多取）
    np: "1"           # 页码类型
    fltt: "2"         # 价格精度
    invt: "2"         # 投资类型
    # 筛选条件说明（fs 参数，多个条件用逗号分隔）：
    #   m:0+t:6      → 深市主板
    #   m:0+t:80     → 深市创业板
    #   m:1+t:2      → 沪市主板（含科创板）
    #   m:1+t:23     → 沪市科创板
    #   m:0+t:81+s:262144 → 深市北交所
    #   +f:!2        → 排除退市股
    fs: "m:0+t:6+f:!2,m:0+t:80+f:!2,m:1+t:2+f:!2,m:1+t:23+f:!2,m:0+t:81+s:262144+f:!2"
    fields: "f12,f13,f14,f152"
    # 字段映射：
    #   f12   → 股票代码（6位数字，如 600519）
    #   f13   → 市场标识（0=深京市，1=沪市）
    #   f14   → 股票名称（如 贵州茅台）
    #   f152  → 股票简称缩写（用于判断 ST/*ST 风险状态）
