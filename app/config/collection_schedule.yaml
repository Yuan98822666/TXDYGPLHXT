# 数据采集频率配置
# 配置文件路径：app/config/collection_schedule.yaml

# 快照采集配置 (raw_min_*)
raw:
  enabled: true
  threads:
    stock: 30
    block: 1
  delays:
    min_ms: 100
    max_ms: 200
  schedules:
    - name: "开盘竞价"
      time: "09:25:00"
      type: "once"
    - name: "早盘连续竞价"
      start_time: "09:30:30"
      end_time: "11:30:00"
      interval_seconds: 30
      type: "interval"
    - name: "下午连续竞价"
      start_time: "13:00:00"
      end_time: "14:27:00"
      interval_seconds: 30
      type: "interval"
    - name: "收盘"
      time: "15:00:00"
      type: "once"
  scope:
    stock: true
    block: true

# 特殊股票池配置 (special_*) - 与 raw_min_* 策略相同
special_pool:
  enabled: true
  schedules:
    - name: "开盘竞价"
      time: "09:25:00"
      type: "once"
    - name: "早盘连续竞价"
      start_time: "09:30:30"
      end_time: "11:30:00"
      interval_seconds: 30
      type: "interval"
    - name: "下午连续竞价"
      start_time: "13:00:00"
      end_time: "14:27:00"
      interval_seconds: 30
      type: "interval"
    - name: "收盘"
      time: "15:00:00"
      type: "once"
  scope:
    zt: true
    zrzt: true
    zb: true
    dt: true

# 日K采集配置 (raw_day_*) - 早盘收盘各一次，收盘那次删除当日数据后重新采集
day_k:
  enabled: true
  schedules:
    - name: "早盘日K"
      time: "09:27:00"
      type: "once"
      action: "append"
    - name: "收盘日K"
      time: "15:05:00"
      type: "once"
      action: "replace"
  scope:
    stock: true
    block: true

# 基础数据采集配置 (base_*) - 仅手动
base:
  enabled: false
  manual_only: true
  scope:
    stock: true
    block: true
    block_stock_lnk: true

# 防封禁配置
anti_ban:
  enabled: true
  interval:
    min_ms: 100
    max_ms: 200
  max_concurrency: 50
  force_delay_after: 100
  force_delay_ms: 1000
  retry:
    max_attempts: 3
    backoff_ms: 500
